{% extends "base.html" %}
{% block title %}Admin login{% endblock %}
{% block body %}
<header><strong>Orvix License — Admin</strong></header>
<div class="card" style="max-width:400px;">
  <h1 style="margin-top:0;font-size:18px;">Sign in</h1>
  {% if error %}<p style="color:var(--bad);">{{ error }}</p>{% endif %}
  <form method="post" action="/admin/login">
    <p><label>Password<br/><input type="password" name="password" style="width:100%;" autofocus/></label></p>
    <p><button type="submit" class="btn">Login</button></p>
  </form>
  <p class="muted">Set ADMIN_PASSWORD on Render (env).</p>
</div>
{% endblock %}
