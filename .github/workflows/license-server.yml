# Optional: run tests / syntax check when license-server changes
name: license-server

on:
  push:
    paths:
      - 'license-server/**'
  pull_request:
    paths:
      - 'license-server/**'

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: license-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python -c "from app.main import app; print('import ok')"
